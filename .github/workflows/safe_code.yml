name: Safe Code Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.5
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: my_db
        ports:
          - 5432:5432
        # Espera a que postgres esté listo
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/my_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Push Schema to DB
        run: pnpm exec prisma db push

      - name: Type Check
        run: pnpm typecheck

      - name: Safe Fixes
        run: pnpm safe-fixes

      - name: Run Tests
        run: pnpm test

      - name: Run Build
        run: pnpm build
