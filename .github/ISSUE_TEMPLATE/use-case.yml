name: '🧪 Test: Use Case (Logic)'
description: 'Unit tests for business logic and use cases using dependency injection.'
title: 'test: [Module] Use Case - [Use Case Name]'
labels: ['test', 'test: unit', 'layer: application', 'layer: domain']
body:
  - type: markdown
    attributes:
      value: |
        ### Objective
        Validate the business logic of the use case in isolation by mocking external dependencies (repositories, services, etc.).
  - type: checkboxes
    id: coverage
    attributes:
      label: 'Test Coverage Scenarios'
      options:
        - label: 'Happy Path: Successful execution and correct data return.'
        - label: 'Error Handling: Expected business exceptions/domain errors.'
        - label: 'Dependency Interaction: Ensure the correct methods are called on injected mocks (Spying).'
  - type: input
    id: dependencies
    attributes:
      label: 'Dependencies to Mock'
      placeholder: 'e.g., IExerciseRepository, IRoutineRepository...'
